version: "3.8"

services:
  ollama:
    image: ollama/ollama:latest
    container_name: rag-ocr-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    # Uncomment to enable GPU acceleration if available (requires nvidia-container-toolkit):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  app:
    build: .
    container_name: rag-ocr-app
    ports:
      - "8000:8000"
    environment:
      - LLM_BACKEND=ollama
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=qwen2.5:3b
    volumes:
      - ./uploads:/app/uploads
      - ./db:/app/db
    depends_on:
      - ollama
    restart: unless-stopped

volumes:
  ollama_data: